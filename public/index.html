<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Management System - API Simulator</title>
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="top-nav">
        <div class="logo">
          <i data-lucide="library"></i>
          <span>Library API Simulator</span>
        </div>
        <div class="stats-overview" id="statsOverview">
          <div class="stat-pill">
            <i data-lucide="book"></i> Books: <span id="statTotalBooks">-</span>
          </div>
          <div class="stat-pill">
            <i data-lucide="users"></i> Members:
            <span id="statTotalMembers">-</span>
          </div>
        </div>
        <div class="actions">
          <button
            class="btn btn-primary"
            onclick="window.open('/api', '_blank')"
          >
            <i data-lucide="external-link"></i> Swagger UI
          </button>
        </div>
      </header>

      <!-- Main Workspace -->
      <main class="workspace">
        <!-- Left Column: Books -->
        <section class="panel books-panel">
          <div class="panel-header">
            <h2><i data-lucide="book-open"></i> Books Catalog</h2>
            <div class="panel-actions">
              <div class="search-box">
                <i data-lucide="search"></i>
                <input
                  type="text"
                  id="bookSearch"
                  placeholder="Search books..."
                  onkeyup="if (event.key === 'Enter') fetchBooks();"
                />
              </div>
              <button
                class="btn btn-icon"
                onclick="fetchBooks()"
                title="Refresh"
              >
                <i data-lucide="refresh-cw"></i>
              </button>
              <button class="btn btn-primary" onclick="openBookModal()">
                <i data-lucide="plus"></i> Add Book
              </button>
            </div>
          </div>
          <div class="scrollable-content" id="booksContainer">
            <!-- Books will be injected here -->
            <div class="loading-spinner">
              <i data-lucide="loader-2" class="spin"></i>
            </div>
          </div>
        </section>

        <!-- Right Column: Members & Transactions -->
        <div class="right-column">
          <section class="panel members-panel">
            <div class="panel-header">
              <h2><i data-lucide="users"></i> Members</h2>
              <div class="panel-actions">
                <button
                  class="btn btn-icon"
                  onclick="fetchMembers()"
                  title="Refresh"
                >
                  <i data-lucide="refresh-cw"></i>
                </button>
                <button class="btn btn-secondary" onclick="openMemberModal()">
                  <i data-lucide="user-plus"></i> Add
                </button>
              </div>
            </div>
            <div class="table-container">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="membersTableBody">
                  <!-- Members will be injected here -->
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel transactions-panel">
            <div class="panel-header">
              <h2><i data-lucide="history"></i> Timeline</h2>
              <div class="panel-actions">
                <button
                  class="btn btn-icon"
                  onclick="fetchTransactions()"
                  title="Refresh"
                >
                  <i data-lucide="refresh-cw"></i>
                </button>
              </div>
            </div>
            <div class="timeline" id="transactionsTimeline">
              <!-- Transactions will be injected here -->
              <div class="empty-state">No transactions yet</div>
            </div>
          </section>
        </div>
      </main>

      <!-- API Log Terminal -->
      <footer class="api-terminal">
        <div class="terminal-header">
          <div><i data-lucide="terminal"></i> API Request Log</div>
          <button
            class="btn btn-icon-small"
            onclick="document.getElementById('apiLogContent').innerHTML = ''"
          >
            <i data-lucide="trash-2"></i>
          </button>
        </div>
        <div class="terminal-content" id="apiLogContent">
          <div class="log-entry info">
            Simulator initialized. Ready to capture network requests.
          </div>
        </div>
      </footer>
    </div>

    <!-- Modals (Hidden by default) -->
    <div class="modal-backdrop" id="bookModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="bookModalTitle">Add New Book</h3>
          <button class="btn-close" onclick="closeModal('bookModal')">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body">
          <form
            id="bookForm"
            onsubmit="
              event.preventDefault();
              submitBookForm();
            "
          >
            <input type="hidden" id="bookId" />
            <div class="form-group">
              <label>ISBN</label>
              <input type="text" id="bookIsbn" required />
            </div>
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="bookTitle" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Author</label>
                <input type="text" id="bookAuthor" required />
              </div>
              <div class="form-group">
                <label>Year</label>
                <input
                  type="number"
                  id="bookYear"
                  required
                  min="1000"
                  max="2100"
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Publisher</label>
                <input type="text" id="bookPublisher" required />
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="bookCategory">
                  <option value="FICTION">Fiction</option>
                  <option value="NON_FICTION">Non-Fiction</option>
                  <option value="SCIENCE">Science</option>
                  <option value="TECHNOLOGY">Technology</option>
                  <option value="HISTORY">History</option>
                  <option value="ART">Art</option>
                  <option value="EDUCATION">Education</option>
                  <option value="OTHER">Other</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="bookDescription" rows="2" required></textarea>
            </div>
            <div class="form-actions">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="closeModal('bookModal')"
              >
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">Save Book</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Member Modal -->
    <div class="modal-backdrop" id="memberModal">
      <div class="modal">
        <div class="modal-header">
          <h3>Add New Member</h3>
          <button class="btn-close" onclick="closeModal('memberModal')">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body">
          <form
            id="memberForm"
            onsubmit="
              event.preventDefault();
              submitMemberForm();
            "
          >
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" id="memberFirstName" required />
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="memberLastName" required />
              </div>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="memberEmail" required />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="memberPhone" required />
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="memberAddress" required />
            </div>
            <div class="form-actions">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="closeModal('memberModal')"
              >
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">Save Member</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Borrow/Reserve Action Modal -->
    <div class="modal-backdrop" id="actionModal">
      <div class="modal modal-small">
        <div class="modal-header">
          <h3 id="actionModalTitle">Select Member</h3>
          <button class="btn-close" onclick="closeModal('actionModal')">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="actionBookId" />
          <input type="hidden" id="actionType" />
          <p id="actionDescription" class="text-muted mb-4"></p>
          <div class="form-group">
            <label>Member</label>
            <select id="actionMemberSelect" required class="w-full">
              <!-- Populated dynamically -->
            </select>
          </div>
          <div class="form-actions mt-4">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal('actionModal')"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="confirmAction()"
              id="actionConfirmBtn"
            >
              Confirm
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
